name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run root tests
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Execute Gradle test suite
        run: ./gradlew test

      - name: Verify fixture sample app
        run: ./gradlew -p fixtures/sample-app :app:test

      - name: Build CLI distribution
        run: ./gradlew :apps:cli:distZip
