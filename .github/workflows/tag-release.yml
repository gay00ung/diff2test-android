name: Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Resolve next version
        id: version
        shell: bash
        run: |
          if git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' >/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=head already has a release tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_TAG="$(git describe --tags --match 'v[0-9]*' --abbrev=0 2>/dev/null || echo 'v0.0.0')"
          git log --format=%B "${LATEST_TAG}..HEAD" > /tmp/d2t-release-commits.txt

          python3 scripts/next_release_version.py \
            --latest-tag "${LATEST_TAG}" \
            --commits-file /tmp/d2t-release-commits.txt \
            --github-output "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: ${{ steps.version.outputs.skip != 'true' }}
        env:
          TAG: ${{ steps.version.outputs.next_tag }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Show tagging summary
        shell: bash
        run: |
          {
            echo "## Tag release"
            echo
            echo "- Latest tag: \`${{ steps.version.outputs.latest_tag || 'n/a' }}\`"
            if [ "${{ steps.version.outputs.skip }}" = "true" ]; then
              echo "- Result: skipped"
              echo "- Reason: ${{ steps.version.outputs.reason }}"
            else
              echo "- Bump: \`${{ steps.version.outputs.bump }}\`"
              echo "- Next tag: \`${{ steps.version.outputs.next_tag }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
